<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Photobooth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: hotpink;
      background-image:
        radial-gradient(circle at 20% 20%, #ff69b4 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #ff1493 0%, transparent 50%);
      color: white;
      text-align: center;
      font-family: 'VT323', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    navigator.mediaDevices.getUserMedia({
  video: {
    width: { ideal: 1920 },
    height: { ideal: 1080 },
    facingMode: "user"
  }
  })
    
    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 4vw, 28px);
      text-shadow: 3px 3px 0 black, -1px -1px 0 cyan;
      margin-bottom: 20px;
      letter-spacing: 2px;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
      98% { opacity: 0.5; }
    }

    .booth-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      align-items: flex-start;
    }

    .camera-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    video {
      width: 300px;
      height: 225px;
      border: 6px solid cyan;
      border-radius: 12px;
      box-shadow: 0 0 20px cyan, 0 0 40px rgba(0,255,255,0.3);
      filter: contrast(1.2) saturate(1.4);
      transform: scaleX(-1);
      background: black;
      display: block;
    }

    #countdown {
      font-family: 'Press Start 2P', monospace;
      font-size: 72px;
      color: lime;
      text-shadow: 4px 4px 0 black, 0 0 20px lime;
      height: 90px;
      line-height: 90px;
      transition: transform 0.1s;
    }

    #countdown.pulse {
      animation: countPulse 0.3s ease-out;
    }

    @keyframes countPulse {
      0% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    button {
      margin-top: 10px;
      padding: 14px 28px;
      background: lime;
      border: 4px solid black;
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      cursor: pointer;
      color: black;
      box-shadow: 4px 4px 0 black;
      transition: all 0.1s;
      text-transform: uppercase;
    }

    button:hover:not(:disabled) {
      background: yellow;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 black;
    }

    button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 black;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .strip-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    canvas {
      border: 6px solid cyan;
      border-radius: 12px;
      box-shadow: 0 0 20px cyan, 0 0 40px rgba(0,255,255,0.3);
      max-width: 320px;
      display: none;
    }

    canvas.visible {
      display: block;
    }

    #download-btn {
      display: none;
      background: cyan;
      color: black;
    }

    #download-btn.visible {
      display: inline-block;
    }

    .status {
      font-family: 'VT323', monospace;
      font-size: 24px;
      color: yellow;
      text-shadow: 2px 2px black;
      height: 30px;
      letter-spacing: 1px;
    }

    .photo-counter {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: white;
      text-shadow: 2px 2px black;
      height: 20px;
    }
  </style>
</head>
<body>

  <h1>★ Retro Booth ★</h1>

  <div class="booth-container">

    <div class="camera-side">
      <video id="video" autoplay playsinline></video>
      <div id="countdown"></div>
      <div class="status" id="status">Listo para sacar fotos</div>
      <div class="photo-counter" id="photo-counter"></div>
      <button id="snap">📸 Sacar Tira</button>
    </div>

    <div class="strip-side">
      <canvas id="canvas"></canvas>
      <button id="download-btn">⬇ Descargar Tira</button>
    </div>

  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const snap = document.getElementById("snap");
    const countdownEl = document.getElementById("countdown");
    const statusEl = document.getElementById("status");
    const photoCounterEl = document.getElementById("photo-counter");
    const downloadBtn = document.getElementById("download-btn");

    const TOTAL_PHOTOS = 3;
    const COUNTDOWN_SECS = 3;
    const photos = [];

    // Iniciar cámara
    navigator.mediaDevices.getUserMedia({ video: true })
      .then((stream) => {
        video.srcObject = stream;
        statusEl.textContent = "Listo para sacar fotos";
      })
      .catch((err) => {
        statusEl.textContent = "Error: no se pudo acceder a la cámara";
        console.error(err);
      });

    // Cuenta regresiva
    function waitCountdown(seconds) {
      return new Promise((resolve) => {
        let remaining = seconds;

        function tick() {
          if (remaining <= 0) {
            countdownEl.textContent = "";
            resolve();
            return;
          }
          countdownEl.textContent = remaining;
          countdownEl.classList.remove("pulse");
          void countdownEl.offsetWidth; // reflow para reiniciar animación
          countdownEl.classList.add("pulse");
          remaining--;
          setTimeout(tick, 1000);
        }

        tick();
      });
    }

    // Captura una foto del video
function capturePhoto() {
  const w = video.videoWidth;
  const h = video.videoHeight;
  const offscreen = document.createElement("canvas");
  offscreen.width = w;
  offscreen.height = h;
  const ctx = offscreen.getContext("2d");

  // espejo
  ctx.translate(w, 0);
  ctx.scale(-1, 1);

  ctx.drawImage(video, 0, 0, w, h);
 return offscreen.toDataURL("image/png");
}

    // Arma la tira de fotos
    function buildStrip(photoDataUrls) {
      return new Promise((resolve) => {
        const w = video.videoWidth;
        const h = video.videoHeight;
        const padding = 24;
        const gap = 12;
        const labelHeight = 0;

        canvas.width = w + padding * 2;
        canvas.height = (h + gap) * TOTAL_PHOTOS - gap + padding * 2 + labelHeight;

        const ctx = canvas.getContext("2d");

        // Fondo blanco de tira
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Borde decorativo
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);

        let loaded = 0;
        photoDataUrls.forEach((dataUrl, i) => {
          const img = new Image();
          img.onload = () => {
            const y = padding + i * (h + gap);
            ctx.drawImage(img, padding, y, w, h);
            loaded++;
            if (loaded === TOTAL_PHOTOS) {
              canvas.classList.add("visible");
              downloadBtn.classList.add("visible");
              resolve();
            }
          };
          img.src = dataUrl;
        });
      });
    }

    // Botón principal
    snap.addEventListener("click", async () => {
      snap.disabled = true;
      canvas.classList.remove("visible");
      downloadBtn.classList.remove("visible");
      photos.length = 0;

      for (let i = 0; i < TOTAL_PHOTOS; i++) {
        statusEl.textContent = `Foto ${i + 1} de ${TOTAL_PHOTOS}`;
        photoCounterEl.textContent = "▪".repeat(i) + "▫".repeat(TOTAL_PHOTOS - i);
        await waitCountdown(COUNTDOWN_SECS);
        photos.push(capturePhoto());
        photoCounterEl.textContent = "▪".repeat(i + 1) + "▫".repeat(TOTAL_PHOTOS - i - 1);
        statusEl.textContent = `¡Foto ${i + 1} sacada!`;
        await new Promise(r => setTimeout(r, 600));
      }

      statusEl.textContent = "Armando la tira...";
      await buildStrip(photos);
      statusEl.textContent = "¡Tira lista!";
      photoCounterEl.textContent = "";
      snap.disabled = false;
    });

    // Descargar
    downloadBtn.addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "retro-booth-tira.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  </script>
</body>
</html>
