<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Photobooth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
    background-image: url("fondo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  
    color: white;
    text-align: center;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    padding: 20px;
}

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3.5vw, 24px);
      text-shadow: 3px 3px 0 black, -1px -1px 0 cyan;
      margin-bottom: 20px;
      letter-spacing: 2px;
      animation: flicker 4s infinite;
    }
    @keyframes flicker {
      0%,95%,100% { opacity:1; } 96% { opacity:.7; } 97% { opacity:1; } 98% { opacity:.5; }
    }

    button {
      padding: 12px 22px;
      background: lime; border: 3px solid black;
      font-family: 'Press Start 2P', monospace; font-size: 11px;
      cursor: pointer; color: black;
      box-shadow: 3px 3px 0 black; transition: all .1s; text-transform: uppercase;
    }
    button:hover:not(:disabled) { background: yellow; transform: translate(-2px,-2px); box-shadow: 5px 5px 0 black; }
    button:active:not(:disabled) { transform: translate(2px,2px); box-shadow: 1px 1px 0 black; }
    button:disabled { background: #888; cursor: not-allowed; opacity: .6; }

    /* ══ BOOTH SCREEN ══ */
    #screen-booth { display: flex; flex-wrap: wrap; justify-content: center; gap: 28px; align-items: flex-start; }

    .camera-side { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    video {
      width: 300px; height: 225px;
      border: 6px solid cyan; border-radius: 12px;
      box-shadow: 0 0 20px cyan, 0 0 40px rgba(0,255,255,.3);
      filter: contrast(1.2) saturate(1.4);
      transform: scaleX(-1); background: black; display: block;
    }

    #countdown {
      font-family: 'Press Start 2P', monospace;
      font-size: 72px; color: lime;
      text-shadow: 4px 4px 0 black, 0 0 20px lime;
      height: 90px; line-height: 90px;
    }
    #countdown.pulse { animation: countPulse .3s ease-out; }
    @keyframes countPulse { 0% { transform: scale(1.5); } 100% { transform: scale(1); } }

    .status { font-size: 22px; color: yellow; text-shadow: 2px 2px black; height: 28px; }
    .photo-counter { font-family:'Press Start 2P',monospace; font-size:10px; color:white; text-shadow:2px 2px black; height:18px; }

    .section-label { font-family:'Press Start 2P',monospace; font-size:8px; color:cyan; text-shadow:1px 1px black; margin-bottom:6px; display:block; letter-spacing:1px; }

    .filters-section { margin-top:6px; width:100%; max-width:316px; }
    .filters-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
    .filter-btn {
      padding:6px 3px; font-family:'VT323',monospace; font-size:13px;
      background:#222; color:white; border:2px solid #555;
      box-shadow:2px 2px 0 black; cursor:pointer; transition:all .1s; line-height:1.2;
    }
    .filter-btn:hover { background:#333; border-color:cyan; }
    .filter-btn.active { background:cyan; color:black; border-color:black; }

    .strip-side { display:flex; flex-direction:column; align-items:center; gap:8px; }

    #canvas-booth {
      border:6px solid cyan; border-radius:12px;
      box-shadow:0 0 20px cyan; max-width:300px; display:none;
    }
    #canvas-booth.visible { display:block; }

    .booth-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    #edit-btn   { background:hotpink; color:white; border-color:white; display:none; }
    #dl-booth   { background:cyan; color:black; display:none; }
    #edit-btn.visible, #dl-booth.visible { display:inline-block; }

    /* ══ EDIT SCREEN ══ */
    #screen-edit { display:none; }
    #screen-edit.visible { display:block; }

    .edit-layout {
      display:flex; flex-wrap:wrap;
      justify-content:center; gap:20px; align-items:flex-start;
    }

    /* Canvas editor */
    .editor-wrap {
      position:relative; display:inline-block;
      flex-shrink:0;
    }
    #canvas-edit {
      border:6px solid cyan; border-radius:12px;
      box-shadow:0 0 20px cyan; max-width:300px; display:block;
    }

    /* Draggable sticker */
    .sticker-ol {
      position:absolute; cursor:grab;
      user-select:none; touch-action:none;
      line-height:1;
      filter:drop-shadow(2px 2px 2px rgba(0,0,0,.5));
    }
    .sticker-ol.sel { outline:2px dashed white; outline-offset:3px; }
    .sticker-ol .del-x {
      position:absolute; top:-10px; right:-10px;
      background:red; color:white; border:2px solid black;
      border-radius:50%; width:20px; height:20px;
      font-size:11px; line-height:18px; text-align:center;
      cursor:pointer; display:none; font-family:monospace;
    }
    .sticker-ol.sel .del-x { display:block; }

    /* Panel */
    .sticker-panel { width:280px; text-align:left; display:flex; flex-direction:column; gap:14px; }

    .cat-row { display:flex; flex-wrap:wrap; gap:5px; }

    .spick {
      font-size:28px; cursor:pointer; padding:3px;
      border-radius:5px; border:2px solid transparent;
      transition:all .1s; background:rgba(0,0,0,.2); line-height:1;
    }
    .spick:hover { border-color:cyan; transform:scale(1.2); background:rgba(0,0,0,.4); }
    .spick.active-pick { border-color:lime; background:rgba(0,255,0,.2); }

    /* Drawn stickers */
    .drawn-pick {
      width:48px; height:48px; cursor:pointer;
      border:2px solid transparent; border-radius:6px;
      background:rgba(0,0,0,.2); transition:all .1s;
      display:flex; align-items:center; justify-content:center;
    }
    .drawn-pick:hover { border-color:cyan; transform:scale(1.15); }
    .drawn-pick.active-pick { border-color:lime; background:rgba(0,255,0,.15); }
    .drawn-pick canvas { width:40px; height:40px; }

    /* Frames */
    .frame-row { display:flex; flex-wrap:wrap; gap:5px; }
    .fpick {
      font-family:'Press Start 2P',monospace; font-size:8px;
      padding:6px 8px; background:#222; color:white;
      border:2px solid #555; cursor:pointer;
      box-shadow:2px 2px 0 black; transition:all .1s;
    }
    .fpick:hover { border-color:cyan; background:#333; }
    .fpick.active { background:cyan; color:black; border-color:black; }

    /* Text */
    .text-row { display:flex; gap:6px; align-items:stretch; flex-wrap:wrap; }
    #txt-in {
      flex:1; min-width:110px; padding:7px;
      font-family:'VT323',monospace; font-size:18px;
      background:#111; color:white; border:2px solid cyan; outline:none;
    }
    #txt-color { width:34px; height:34px; padding:2px; border:2px solid cyan; cursor:pointer; background:none; }
    #add-txt { padding:7px 10px; font-size:9px; background:lime; color:black; margin-top:0; }

    /* Size */
    .size-row { display:flex; align-items:center; gap:8px; }
    .size-row label { font-family:'Press Start 2P',monospace; font-size:7px; color:cyan; white-space:nowrap; }
    #sz-slider { flex:1; accent-color:cyan; }

    /* Edit actions */
    .edit-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:6px; }
    .edit-actions button { font-size:9px; padding:9px 14px; }
    #undo-btn   { background:orange; color:black; }
    #back-btn   { background:#ff69b4; color:white; border-color:white; }
    #finish-btn { background:lime; color:black; }
  </style>
</head>
<body>

<h1>★ Retro Booth ★</h1>

<!-- ══════════ BOOTH SCREEN ══════════ -->
<div id="screen-booth">

  <div class="camera-side">
    <video id="video" autoplay playsinline></video>
    <div id="countdown"></div>
    <div class="status" id="status">Listo para sacar fotos</div>
    <div class="photo-counter" id="photo-counter"></div>

    <div class="filters-section">
      <span class="section-label">— FILTROS —</span>
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">🎥 Normal</button>
        <button class="filter-btn" data-filter="bw">⬛ B&amp;N</button>
        <button class="filter-btn" data-filter="sepia">🟤 Sepia</button>
        <button class="filter-btn" data-filter="vintage">📷 Vintage</button>
        <button class="filter-btn" data-filter="neon">💚 Neon</button>
        <button class="filter-btn" data-filter="invert">🔄 Invertir</button>
        <button class="filter-btn" data-filter="glitch">⚡ Glitch</button>
        <button class="filter-btn" data-filter="vignette">🌑 Vignette</button>
      </div>
    </div>

    <button id="snap" style="margin-top:10px;">📸 Sacar Tira</button>
  </div>

  <div class="strip-side">
    <canvas id="canvas-booth"></canvas>
    <div class="booth-actions">
      <button id="edit-btn">✏️ Decorar</button>
      <button id="dl-booth">⬇ Descargar</button>
    </div>
  </div>

</div>

<!-- ══════════ EDIT SCREEN ══════════ -->
<div id="screen-edit">

  <div class="edit-layout">

    <!-- Canvas con stickers encima -->
    <div>
      <div class="editor-wrap" id="editor-wrap">
        <canvas id="canvas-edit"></canvas>
      </div>
      <div class="edit-actions">
        <button id="undo-btn">↩ Deshacer</button>
        <button id="back-btn">← Volver</button>
        <button id="finish-btn">✅ Listo</button>
      </div>
    </div>

    <!-- Panel de herramientas -->
    <div class="sticker-panel">

      <!-- Emojis -->
      <div>
        <span class="section-label">— EMOJIS —</span>
        <div class="cat-row" id="emoji-row"></div>
      </div>

      <!-- Stickers dibujados -->
      <div>
        <span class="section-label">— STICKERS —</span>
        <div class="cat-row" id="drawn-row"></div>
      </div>

      <!-- Marcos -->
      <div>
        <span class="section-label">— MARCO —</span>
        <div class="frame-row" id="frame-row">
          <button class="fpick active" data-frame="none">Sin marco</button>
          <button class="fpick" data-frame="retro">Retro</button>
          <button class="fpick" data-frame="rainbow">Arco iris</button>
          <button class="fpick" data-frame="hearts">❤️ Corazones</button>
          <button class="fpick" data-frame="stars">⭐ Estrellas</button>
          <button class="fpick" data-frame="flowers">🌸 Flores</button>
        </div>
      </div>

      <!-- Texto -->
      <div>
        <span class="section-label">— TEXTO —</span>
        <div class="text-row">
          <input id="txt-in" type="text" placeholder="Escribí algo...">
          <input id="txt-color" type="color" value="#ff00ff">
          <button id="add-txt">+ Agregar</button>
        </div>
      </div>

      <!-- Tamaño -->
      <div>
        <div class="size-row">
          <label>TAMAÑO:</label>
          <input id="sz-slider" type="range" min="20" max="120" value="48">
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ════════════════════════════════
//  BOOTH
// ════════════════════════════════
const video        = document.getElementById("video");
const canvasBooth  = document.getElementById("canvas-booth");
const snapBtn      = document.getElementById("snap");
const countdownEl  = document.getElementById("countdown");
const statusEl     = document.getElementById("status");
const counterEl    = document.getElementById("photo-counter");
const editBtn      = document.getElementById("edit-btn");
const dlBtn        = document.getElementById("dl-booth");
const screenBooth  = document.getElementById("screen-booth");
const screenEdit   = document.getElementById("screen-edit");

const TOTAL = 3, CD = 3;
const photos = [];

const FILTERS = {
  none:    "contrast(1.2) saturate(1.4)",
  bw:      "grayscale(1) contrast(1.3)",
  sepia:   "sepia(.9) contrast(1.1) brightness(1.05)",
  vintage: "sepia(.4) contrast(1.2) saturate(.7) brightness(.95) hue-rotate(10deg)",
  neon:    "saturate(3) contrast(1.4) brightness(1.1) hue-rotate(90deg)",
  invert:  "invert(1) contrast(1.1)",
  glitch:  "contrast(1.5) saturate(2) hue-rotate(180deg) brightness(1.2)",
  vignette:"contrast(1.3) brightness(.85) saturate(1.2)",
};
let activeFilter = "none";

navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => { video.srcObject = s; })
  .catch(() => { statusEl.textContent = "Error: sin acceso a cámara"; });

document.getElementById("filters-grid").addEventListener("click", e => {
  const b = e.target.closest(".filter-btn"); if (!b) return;
  activeFilter = b.dataset.filter;
  document.querySelectorAll(".filter-btn").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  video.style.filter = FILTERS[activeFilter];
});

function waitCD(n) {
  return new Promise(resolve => {
    let r = n;
    const tick = () => {
      if (r <= 0) { countdownEl.textContent = ""; resolve(); return; }
      countdownEl.textContent = r;
      countdownEl.classList.remove("pulse");
      void countdownEl.offsetWidth;
      countdownEl.classList.add("pulse");
      r--; setTimeout(tick, 1000);
    };
    tick();
  });
}

function capturePhoto() {
  const w = video.videoWidth, h = video.videoHeight;
  const oc = document.createElement("canvas");
  oc.width = w; oc.height = h;
  const ctx = oc.getContext("2d");
  ctx.filter = FILTERS[activeFilter];
  ctx.translate(w, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, w, h);
  ctx.setTransform(1,0,0,1,0,0);
  if (activeFilter === "vignette") {
    ctx.filter = "none";
    const g = ctx.createRadialGradient(w/2,h/2,h*.3,w/2,h/2,h*.85);
    g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.6)");
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  }
  return oc.toDataURL("image/png");
}

function buildStrip(urls) {
  return new Promise(resolve => {
    const w = video.videoWidth, h = video.videoHeight;
    const pad = 24, gap = 12;
    canvasBooth.width  = w + pad*2;
    canvasBooth.height = (h+gap)*TOTAL - gap + pad*2;
    const ctx = canvasBooth.getContext("2d");
    ctx.fillStyle = "white"; ctx.fillRect(0,0,canvasBooth.width,canvasBooth.height);
    ctx.strokeStyle="#000"; ctx.lineWidth=3;
    ctx.strokeRect(6,6,canvasBooth.width-12,canvasBooth.height-12);
    let loaded = 0;
    urls.forEach((url, i) => {
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, pad, pad + i*(h+gap), w, h);
        if (++loaded === TOTAL) { canvasBooth.classList.add("visible"); resolve(); }
      };
      img.src = url;
    });
  });
}

snapBtn.addEventListener("click", async () => {
  snapBtn.disabled = true;
  editBtn.classList.remove("visible"); dlBtn.classList.remove("visible");
  canvasBooth.classList.remove("visible");
  photos.length = 0;

  for (let i = 0; i < TOTAL; i++) {
    statusEl.textContent = `Foto ${i+1} de ${TOTAL}`;
    counterEl.textContent = "▪".repeat(i) + "▫".repeat(TOTAL-i);
    await waitCD(CD);
    photos.push(capturePhoto());
    counterEl.textContent = "▪".repeat(i+1) + "▫".repeat(TOTAL-i-1);
    statusEl.textContent = `¡Foto ${i+1} sacada!`;
    await new Promise(r => setTimeout(r, 500));
  }

  statusEl.textContent = "Armando la tira...";
  await buildStrip(photos);
  statusEl.textContent = "¡Tira lista! Podés decorarla ✨";
  counterEl.textContent = "";
  editBtn.classList.add("visible");
  dlBtn.classList.add("visible");
  snapBtn.disabled = false;
});

dlBtn.addEventListener("click", () => {
  const a = document.createElement("a");
  a.download = "retro-tira.png";
  a.href = canvasBooth.toDataURL("image/png");
  a.click();
});

// ════════════════════════════════
//  EDIT MODE
// ════════════════════════════════
const canvasEdit  = document.getElementById("canvas-edit");
const editorWrap  = document.getElementById("editor-wrap");
const szSlider    = document.getElementById("sz-slider");

let selectedSticker = null;
let activeFrame     = "none";
let stickerHistory  = [];

// ── Populate emoji palette ──
const EMOJIS = [
  "❤️","🧡","💛","💚","💙","💜","🖤","🤍",
  "⭐","🌟","✨","💫","🔥","🎉","🎊","🌈",
  "😍","😘","🥰","😂","😎","🤩","😜","🥳",
  "🦋","🌸","🌺","🌻","🍀","🌙","☀️","❄️",
];
const emojiRow = document.getElementById("emoji-row");
EMOJIS.forEach(em => {
  const d = document.createElement("div");
  d.className = "spick"; d.textContent = em;
  d.addEventListener("click", () => { saveHistory(); addSticker(em, false); });
  emojiRow.appendChild(d);
});

// ── Drawn stickers (SVG rendered to mini canvas) ──
const DRAWN = [
  { id:"rainbow", draw: (ctx,s) => {
    const colors=["red","orange","yellow","green","dodgerblue","violet"];
    colors.forEach((c,i)=>{
      ctx.beginPath(); ctx.strokeStyle=c; ctx.lineWidth=s*.045;
      ctx.arc(s/2,s*.75,(s*.38)-(i*s*.055),Math.PI,0);
      ctx.stroke();
    });
  }},
  { id:"lightning", draw:(ctx,s)=>{
    ctx.fillStyle="#FFE000";
    ctx.strokeStyle="#000"; ctx.lineWidth=s*.04;
    ctx.beginPath();
    ctx.moveTo(s*.55,s*.05); ctx.lineTo(s*.25,s*.52); ctx.lineTo(s*.48,s*.52);
    ctx.lineTo(s*.3,s*.95);  ctx.lineTo(s*.72,s*.42); ctx.lineTo(s*.5,s*.42);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }},
  { id:"flower", draw:(ctx,s)=>{
    const cx=s/2,cy=s/2,r=s*.18,pr=s*.28;
    const petals=6;
    ctx.fillStyle="#FF69B4";
    for(let i=0;i<petals;i++){
      const a=(i/petals)*Math.PI*2;
      ctx.beginPath();
      ctx.ellipse(cx+Math.cos(a)*pr, cy+Math.sin(a)*pr, r, r*.6, a, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle="#FFE000";
    ctx.beginPath(); ctx.arc(cx,cy,r*.8,0,Math.PI*2); ctx.fill();
  }},
  { id:"star", draw:(ctx,s)=>{
    ctx.fillStyle="#FFD700"; ctx.strokeStyle="#000"; ctx.lineWidth=s*.03;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*4*Math.PI/5)-Math.PI/2;
      const b=((i*4+2)*Math.PI/5)-Math.PI/2;
      ctx.lineTo(s/2+Math.cos(a)*s*.42, s/2+Math.sin(a)*s*.42);
      ctx.lineTo(s/2+Math.cos(b)*s*.18, s/2+Math.sin(b)*s*.18);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }},
  { id:"heart", draw:(ctx,s)=>{
    ctx.fillStyle="#FF1493"; ctx.strokeStyle="#000"; ctx.lineWidth=s*.04;
    ctx.beginPath();
    const x=s*.5,y=s*.5,w=s*.38,h=s*.35;
    ctx.moveTo(x,y+h*.4);
    ctx.bezierCurveTo(x-w,y,x-w,y-h,x,y-h*.3);
    ctx.bezierCurveTo(x+w,y-h,x+w,y,x,y+h*.4);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }},
  { id:"crown", draw:(ctx,s)=>{
    ctx.fillStyle="#FFD700"; ctx.strokeStyle="#000"; ctx.lineWidth=s*.04;
    ctx.beginPath();
    ctx.moveTo(s*.1,s*.75); ctx.lineTo(s*.1,s*.4);
    ctx.lineTo(s*.3,s*.6);  ctx.lineTo(s*.5,s*.2);
    ctx.lineTo(s*.7,s*.6);  ctx.lineTo(s*.9,s*.4);
    ctx.lineTo(s*.9,s*.75); ctx.closePath();
    ctx.fill(); ctx.stroke();
    [.2,.5,.8].forEach(px=>{
      ctx.fillStyle="#FF4444";
      ctx.beginPath(); ctx.arc(s*px,s*.32,s*.07,0,Math.PI*2); ctx.fill();
    });
  }},
  { id:"ribbon", draw:(ctx,s)=>{
    ctx.fillStyle="#FF69B4"; ctx.strokeStyle="#000"; ctx.lineWidth=s*.03;
    [[s*.5,s*.15,s*.1,s*.4,s*.28,s*.28],
     [s*.5,s*.15,s*.9,s*.4,s*.72,s*.28]].forEach(([x1,y1,x2,y2,cx,cy])=>{
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cx,cy,x2,y2);
      ctx.quadraticCurveTo(s*.5,s*.5,x1,y1);
      ctx.fill(); ctx.stroke();
    });
    ctx.fillStyle="#FF1493";
    ctx.beginPath(); ctx.arc(s*.5,s*.5,s*.1,0,Math.PI*2); ctx.fill();
    // tails
    ctx.strokeStyle="#FF69B4"; ctx.lineWidth=s*.06;
    ctx.beginPath(); ctx.moveTo(s*.5,s*.5); ctx.lineTo(s*.35,s*.85); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.5,s*.5); ctx.lineTo(s*.65,s*.85); ctx.stroke();
  }},
  { id:"music", draw:(ctx,s)=>{
    ctx.fillStyle="#00FFFF"; ctx.strokeStyle="#000"; ctx.lineWidth=s*.03;
    // note 1
    ctx.beginPath(); ctx.arc(s*.3,s*.65,s*.12,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillRect(s*.41,s*.25,s*.05,s*.42); ctx.strokeRect(s*.41,s*.25,s*.05,s*.42);
    // note 2
    ctx.beginPath(); ctx.arc(s*.62,s*.72,s*.12,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillRect(s*.73,s*.3,s*.05,s*.44); ctx.strokeRect(s*.73,s*.3,s*.05,s*.44);
    // beam
    ctx.strokeStyle="#00FFFF"; ctx.lineWidth=s*.06;
    ctx.beginPath(); ctx.moveTo(s*.41,s*.27); ctx.lineTo(s*.78,s*.32); ctx.stroke();
  }},
];

const drawnRow = document.getElementById("drawn-row");
DRAWN.forEach(d => {
  const wrap = document.createElement("div");
  wrap.className = "drawn-pick";
  const mc = document.createElement("canvas");
  mc.width = mc.height = 80;
  d.draw(mc.getContext("2d"), 80);
  wrap.appendChild(mc);
  wrap.addEventListener("click", () => { saveHistory(); addDrawnSticker(d.id, d.draw); });
  drawnRow.appendChild(wrap);
});

// ── Enter edit mode ──
editBtn.addEventListener("click", () => {
  canvasEdit.width  = canvasBooth.width;
  canvasEdit.height = canvasBooth.height;
  canvasEdit.getContext("2d").drawImage(canvasBooth, 0, 0);
  editorWrap.querySelectorAll(".sticker-ol").forEach(s => s.remove());
  stickerHistory = [];
  activeFrame = "none";
  document.querySelectorAll(".fpick").forEach(b => b.classList.toggle("active", b.dataset.frame==="none"));
  screenBooth.style.display = "none";
  screenEdit.classList.add("visible");
});

document.getElementById("back-btn").addEventListener("click", () => {
  screenBooth.style.display = "";
  screenEdit.classList.remove("visible");
});

// ── Deselect on canvas click ──
canvasEdit.addEventListener("click", () => deselectAll());

function deselectAll() {
  document.querySelectorAll(".sticker-ol").forEach(s => s.classList.remove("sel"));
  selectedSticker = null;
}

// ── Add emoji sticker ──
function addSticker(content, isText, color) {
  const el = document.createElement("div");
  el.className = "sticker-ol";
  el.dataset.type = isText ? "text" : "emoji";
  el.dataset.content = content;
  el.dataset.color = color || "#ff00ff";
  const sz = parseInt(szSlider.value);
  el.style.fontSize = sz + "px";
  el.style.left = "38%"; el.style.top = "38%";

  if (isText) {
    el.style.fontFamily = "'Press Start 2P', monospace";
    el.style.color = color || "#ff00ff";
    el.style.textShadow = "2px 2px 0 black";
    el.style.whiteSpace = "nowrap";
    el.textContent = content;
  } else {
    el.textContent = content;
  }

  attachDelBtn(el);
  editorWrap.appendChild(el);
  makeDraggable(el);
  selectSticker(el);
}

// ── Add drawn sticker (renders to img) ──
function addDrawnSticker(id, drawFn) {
  const sz = parseInt(szSlider.value) * 2;
  const oc = document.createElement("canvas");
  oc.width = oc.height = sz;
  drawFn(oc.getContext("2d"), sz);

  const el = document.createElement("div");
  el.className = "sticker-ol";
  el.dataset.type = "drawn";
  el.dataset.drawnId = id;
  el.dataset.drawFnStr = id; // reference by id for undo

  const img = document.createElement("img");
  img.src = oc.toDataURL();
  img.style.width = img.style.height = parseInt(szSlider.value) + "px";
  img.draggable = false;
  el.appendChild(img);
  el.style.left = "38%"; el.style.top = "38%";

  attachDelBtn(el);
  editorWrap.appendChild(el);
  makeDraggable(el);
  selectSticker(el);
}

function attachDelBtn(el) {
  const del = document.createElement("span");
  del.className = "del-x"; del.textContent = "✕";
  del.addEventListener("click", e => { e.stopPropagation(); saveHistory(); el.remove(); });
  el.appendChild(del);
}

function selectSticker(el) {
  deselectAll();
  el.classList.add("sel");
  selectedSticker = el;
  const img = el.querySelector("img");
  szSlider.value = img ? parseInt(img.style.width) : (parseInt(el.style.fontSize) || 48);
}

// ── Size slider ──
szSlider.addEventListener("input", () => {
  if (!selectedSticker) return;
  const sz = szSlider.value;
  const img = selectedSticker.querySelector("img");
  if (img) {
    img.style.width = img.style.height = sz + "px";
    // redraw at new size
    const id = selectedSticker.dataset.drawnId;
    const d = DRAWN.find(x => x.id === id);
    if (d) {
      const oc = document.createElement("canvas");
      oc.width = oc.height = sz * 2;
      d.draw(oc.getContext("2d"), sz * 2);
      img.src = oc.toDataURL();
    }
  } else {
    selectedSticker.style.fontSize = sz + "px";
  }
});

// ── Drag ──
function makeDraggable(el) {
  let sx, sy, sl, st;

  function onStart(e) {
    if (e.target.classList.contains("del-x")) return;
    e.preventDefault();
    selectSticker(el);
    const pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX; sy = pt.clientY;
    sl = el.offsetLeft; st = el.offsetTop;
    document.addEventListener("mousemove", onMove);
    document.addEventListener("touchmove", onMove, { passive:false });
    document.addEventListener("mouseup",  onEnd);
    document.addEventListener("touchend", onEnd);
  }

  function onMove(e) {
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const wr = editorWrap.getBoundingClientRect();
    const cr = canvasEdit.getBoundingClientRect();
    const scX = canvasEdit.width  / cr.width;
    const scY = canvasEdit.height / cr.height;
    el.style.left = (sl + (pt.clientX - sx) * scX) + "px";
    el.style.top  = (st + (pt.clientY - sy) * scY) + "px";
  }

  function onEnd() {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("touchmove", onMove);
    document.removeEventListener("mouseup",  onEnd);
    document.removeEventListener("touchend", onEnd);
  }

  el.addEventListener("mousedown",  onStart);
  el.addEventListener("touchstart", onStart, { passive:false });
}

// ── Text ──
document.getElementById("add-txt").addEventListener("click", () => {
  const txt = document.getElementById("txt-in").value.trim();
  if (!txt) return;
  saveHistory();
  addSticker(txt, true, document.getElementById("txt-color").value);
  document.getElementById("txt-in").value = "";
});

// ── Frames ──
document.getElementById("frame-row").addEventListener("click", e => {
  const b = e.target.closest(".fpick"); if (!b) return;
  activeFrame = b.dataset.frame;
  document.querySelectorAll(".fpick").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  redrawFrame();
});

function redrawFrame() {
  const ctx = canvasEdit.getContext("2d");
  ctx.clearRect(0,0,canvasEdit.width,canvasEdit.height);
  ctx.drawImage(canvasBooth,0,0);
  const W = canvasEdit.width, H = canvasEdit.height;
  if (activeFrame === "none") return;

  if (activeFrame === "retro") {
    ctx.strokeStyle="#ff00ff"; ctx.lineWidth=14;
    ctx.strokeRect(7,7,W-14,H-14);
    ctx.strokeStyle="cyan"; ctx.lineWidth=5;
    ctx.strokeRect(20,20,W-40,H-40);
    return;
  }
  if (activeFrame === "rainbow") {
    ["red","orange","yellow","lime","cyan","dodgerblue","violet"].forEach((c,i)=>{
      ctx.strokeStyle=c; ctx.lineWidth=5;
      const o=6+i*6; ctx.strokeRect(o,o,W-o*2,H-o*2);
    }); return;
  }
  const eMap = { hearts:"❤️", stars:"⭐", flowers:"🌸" };
  const em = eMap[activeFrame];
  if (!em) return;
  ctx.font = "26px serif";
  const step = 34;
  for (let x=10; x<W; x+=step) { ctx.fillText(em,x,24); ctx.fillText(em,x,H-4); }
  for (let y=step; y<H-step; y+=step) { ctx.fillText(em,4,y); ctx.fillText(em,W-28,y); }
}

// ── History ──
function saveHistory() {
  const state = [...editorWrap.querySelectorAll(".sticker-ol")].map(s => {
    const img = s.querySelector("img");
    return {
      type:     s.dataset.type,
      content:  s.dataset.content,
      color:    s.dataset.color,
      drawnId:  s.dataset.drawnId,
      left:     s.style.left,
      top:      s.style.top,
      fontSize: s.style.fontSize,
      imgSrc:   img ? img.src : null,
      imgSize:  img ? img.style.width : null,
      fontFamily: s.style.fontFamily,
      textShadow: s.style.textShadow,
      whiteSpace: s.style.whiteSpace,
    };
  });
  stickerHistory.push(state);
  if (stickerHistory.length > 30) stickerHistory.shift();
}

document.getElementById("undo-btn").addEventListener("click", () => {
  if (!stickerHistory.length) return;
  const prev = stickerHistory.pop();
  editorWrap.querySelectorAll(".sticker-ol").forEach(s => s.remove());
  prev.forEach(s => {
    const el = document.createElement("div");
    el.className = "sticker-ol";
    el.dataset.type    = s.type;
    el.dataset.content = s.content || "";
    el.dataset.color   = s.color   || "#ff00ff";
    el.dataset.drawnId = s.drawnId || "";
    el.style.left = s.left; el.style.top = s.top;

    if (s.type === "drawn" && s.imgSrc) {
      const img = document.createElement("img");
      img.src = s.imgSrc; img.draggable = false;
      img.style.width = img.style.height = s.imgSize;
      el.appendChild(img);
    } else {
      el.style.fontSize   = s.fontSize;
      el.textContent      = s.content;
      if (s.type === "text") {
        el.style.color      = s.color;
        el.style.fontFamily = s.fontFamily;
        el.style.textShadow = s.textShadow;
        el.style.whiteSpace = s.whiteSpace;
      }
    }
    attachDelBtn(el);
    editorWrap.appendChild(el);
    makeDraggable(el);
  });
  deselectAll();
  redrawFrame();
});

// ── Finish: flatten everything ──
document.getElementById("finish-btn").addEventListener("click", () => {
  deselectAll();
  redrawFrame();

  const ctx = canvasEdit.getContext("2d");
  const cr  = canvasEdit.getBoundingClientRect();
  const scX = canvasEdit.width  / cr.width;
  const scY = canvasEdit.height / cr.height;

  [...editorWrap.querySelectorAll(".sticker-ol")].forEach(s => {
    const sr  = s.getBoundingClientRect();
    const cx  = (sr.left - cr.left) * scX;
    const cy  = (sr.top  - cr.top ) * scY;
    const img = s.querySelector("img");

    if (img) {
      const iw = parseFloat(img.style.width)  * scX;
      const ih = parseFloat(img.style.height) * scY;
      const tmp = document.createElement("canvas");
      tmp.width = tmp.height = iw;
      // draw from img element
      ctx.drawImage(img, cx, cy, iw, ih);
    } else {
      const sz = parseInt(s.style.fontSize) * scX;
      if (s.dataset.type === "text") {
        ctx.font = `${sz}px 'Press Start 2P', monospace`;
        ctx.fillStyle = s.dataset.color || "#ff00ff";
        ctx.shadowColor = "black"; ctx.shadowOffsetX = 2*scX; ctx.shadowOffsetY = 2*scY;
        ctx.fillText(s.dataset.content, cx, cy + sz);
        ctx.shadowColor = "transparent";
      } else {
        ctx.font = `${sz}px serif`;
        ctx.fillText(s.dataset.content, cx, cy + sz);
      }
    }
  });

  // copy to booth canvas & go back
  canvasBooth.width  = canvasEdit.width;
  canvasBooth.height = canvasEdit.height;
  canvasBooth.getContext("2d").drawImage(canvasEdit, 0, 0);

  screenEdit.classList.remove("visible");
  screenBooth.style.display = "";
  statusEl.textContent = "¡Tira decorada lista! 🎉";
});
</script>
